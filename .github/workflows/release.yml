name: Release D2MXLUtils

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $bundlePath = "src-tauri/target/release/bundle"
          if (!(Test-Path $bundlePath)) {
            Write-Error "Bundle path '$bundlePath' not found. Check Tauri build output."
          }
          Compress-Archive -Path "$bundlePath\*" -DestinationPath "d2mxlutils-windows-bundle.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: D2MXLUtils ${{ github.ref_name }}
          files: d2mxlutils-windows-bundle.zip
          draft: false
          prerelease: false
