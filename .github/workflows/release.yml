name: Release D2MXLUtils

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Fix changelog spacing
        shell: bash
        run: awk '/^## /{if(seen)print"";seen=1}{print}' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Build Tauri app (32-bit)
        run: pnpm tauri build --target i686-pc-windows-msvc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: D2MXLUtils ${{ github.ref_name }}
          body_path: CHANGES.md
          files: src-tauri/target/i686-pc-windows-msvc/release/d2mxlutils.exe
          draft: false
          prerelease: false

      - name: Commit and push changelog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout master
          cp CHANGELOG.md CHANGELOG.md.new
          git checkout -- CHANGELOG.md
          mv CHANGELOG.md.new CHANGELOG.md
          git add CHANGELOG.md
          git diff --staged --quiet || { git commit -m "docs: update CHANGELOG.md" && git push origin master; }
